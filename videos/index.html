<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>⚔️ WARTIME PORTFOLIO MONITOR</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:linear-gradient(135deg,#0a0a1a,#1a1a2e,#0d1117);color:#e6e6e6;min-height:100vh}
input[type=number]::-webkit-inner-spin-button,input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:#0a0a1a}::-webkit-scrollbar-thumb{background:#00ff8844;border-radius:3px}
.header{background:linear-gradient(90deg,#0d1117,#161b22,#0d1117);border-bottom:2px solid #00ff8833;padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
.title{font-size:17px;font-weight:900;color:#00ff88;letter-spacing:2px}
.subtitle{font-size:10px;color:#8892b0;margin-top:2px}
.clock{font-size:15px;color:#00ff88;font-weight:700;text-align:right}
.clock-sub{font-size:10px;color:#8892b0}
.pnl{padding:14px 20px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:14px;border-bottom:1px solid #ffffff11}
.pnl-label{color:#8892b0;font-size:11px}
.pnl-val{font-size:16px;font-weight:700}
.pnl-big{font-size:22px;font-weight:900}
.tabs{display:flex;gap:3px;padding:10px 20px 0;flex-wrap:wrap}
.tab{padding:9px 14px;background:transparent;color:#8892b0;border:1px solid transparent;border-bottom:none;cursor:pointer;font-family:inherit;font-size:11px;border-radius:6px 6px 0 0;font-weight:400}
.tab.active{background:#1a1a2e;color:#00ff88;border-color:#00ff88;font-weight:700}
.content{margin:0 20px 20px;background:#1a1a2e;border:1px solid #00ff8833;border-radius:0 8px 8px 8px;padding:18px;min-height:400px}
.card{background:#0d1117;border:1px solid #ffffff11;border-radius:8px;padding:14px}
.grid{display:grid;gap:10px}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(150px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(250px,1fr))}
.tag{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;display:inline-block}
.green{color:#00ff88}.red{color:#ff4444}.yellow{color:#FFD700}.muted{color:#8892b0}
table{width:100%;border-collapse:collapse;font-size:11px}
th{padding:7px 5px;text-align:left;color:#8892b0;font-size:10px;border-bottom:2px solid #00ff8833}
td{padding:7px 5px;border-bottom:1px solid #ffffff06}
.inp{background:#1a1a2e;border:1px solid #00ff8844;border-radius:6px;padding:9px 11px;color:#00ff88;font-size:17px;font-weight:700;font-family:inherit;outline:none;width:100%}
.inp-news{font-size:13px;color:#e6e6e6;flex:1;min-width:200px}
.btn{background:#00ff88;color:#0a0a1a;border:none;border-radius:6px;padding:10px 20px;font-weight:700;cursor:pointer;font-family:inherit;font-size:12px}
.btn-sm{padding:5px 8px;font-size:9px;background:#0d1117;border:1px solid #ffffff15;color:#8892b0;border-radius:4px;cursor:pointer;font-family:inherit}
.alert-item{border-radius:6px;padding:9px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:5px;font-size:11px}
.scenario-item{cursor:pointer;display:flex;align-items:center;gap:11px;transition:all .2s}
.check{width:21px;height:21px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:900;flex-shrink:0}
.phase{border-left-width:4px;border-left-style:solid;border-radius:0 8px 8px 0;margin-bottom:9px}
.flow-btn{width:100%;background:#0d1117;border:1px solid #00ff8833;border-radius:8px;padding:10px;color:#00ff88;font-size:11px;cursor:pointer;font-family:inherit;margin-top:10px}
.flow-box{background:#0d1117;border:1px solid #ff444444;border-radius:0 0 8px 8px;padding:15px;font-size:11px;line-height:2.1;margin:0 20px 20px}
.auto-badge{display:inline-block;background:#00ff8822;color:#00ff88;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;margin-left:8px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.refresh-bar{background:#0d111799;padding:6px 20px;display:flex;justify-content:space-between;align-items:center;font-size:9px;color:#8892b0;border-bottom:1px solid #ffffff08}
</style>
</head>
<body>
<div id="app"></div>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useCallback,useRef}=React;

const PORTFOLIO=[
{name:"KODEX 골드선물(H)",code:"132030",cat:"금",amt:5000000,w:"16.7%",c:"#FFD700"},
{name:"ACE KRX금현물",code:"411060",cat:"금",amt:4000000,w:"13.3%",c:"#FFC107"},
{name:"KODEX 미국달러선물",code:"261240",cat:"달러",amt:4000000,w:"13.3%",c:"#4CAF50"},
{name:"TIGER 미국달러단기채권",code:"329750",cat:"달러",amt:3500000,w:"11.7%",c:"#66BB6A"},
{name:"KODEX WTI원유선물(H)",code:"261220",cat:"에너지",amt:3000000,w:"10%",c:"#FF5722"},
{name:"KODEX 200선물인버스2X",code:"252670",cat:"인버스",amt:2000000,w:"6.7%",c:"#9C27B0"},
{name:"한화에어로스페이스",code:"012450",cat:"방산",amt:2000000,w:"6.7%",c:"#2196F3"},
{name:"KODEX 코스닥150인버스",code:"251340",cat:"인버스",amt:1000000,w:"3.3%",c:"#AB47BC"},
{name:"LIG넥스원",code:"079550",cat:"방산",amt:1000000,w:"3.3%",c:"#42A5F5"},
{name:"금융인버스(4월)",code:"TBD",cat:"인버스",amt:1500000,w:"5%",c:"#CE93D8"},
{name:"천연가스/추가",code:"396520",cat:"에너지",amt:1500000,w:"5%",c:"#FF7043"},
];

const SCENARIOS=[
{id:"s1",label:"이란 항복/휴전",lv:"RED",action:"🔴 전량 매도",icon:"🏳️"},
{id:"s2",label:"호르무즈 봉쇄 해제",lv:"RED",action:"🔴 에너지 전량 매도",icon:"🚢"},
{id:"s3",label:"미-이란 공식 협상",lv:"YELLOW",action:"🟡 50% 축소",icon:"🤝"},
{id:"s4",label:"트럼프 작전종료",lv:"RED",action:"🔴 방산 외 매도",icon:"📢"},
{id:"s5",label:"러시아 중립 선언",lv:"YELLOW",action:"🟡 30% 축소",icon:"🇷🇺"},
{id:"s6",label:"은행 부실 공개",lv:"GREEN",action:"🟢 금융인버스 매수",icon:"🏦"},
{id:"s7",label:"유가 $100 돌파",lv:"GREEN",action:"🟢 원유 절반 익절",icon:"🛢️"},
{id:"s8",label:"금 $3,000 돌파",lv:"GREEN",action:"🟢 금 일부 익절",icon:"🥇"},
];

const KW={
red:["휴전","항복","협상 타결","봉쇄 해제","작전 종료","ceasefire","surrender","deal reached"],
yellow:["협상 개시","대화 재개","중립","평화","talks resume","negotiations"],
green:["보복 공격","봉쇄 강화","추가 공습","확전","부실 공개","PF대출","escalation","retaliation","워크아웃"],
};

const fmt=n=>{if(n>=1e8)return(n/1e8).toFixed(1)+"억";if(n>=1e4)return(n/1e4).toFixed(0)+"만";return n.toLocaleString()};

function App(){
const[time,setTime]=useState(new Date());
const[tab,setTab]=useState("overview");
const[alerts,setAlerts]=useState([]);
const[scChecks,setScChecks]=useState({});
const[prices,setPrices]=useState({wti:67.02,gold:2650,usdkrw:1450,natgas:3.8,kospi:6244,kosdaq:1165});
const[lastFetch,setLastFetch]=useState(null);
const[autoOn,setAutoOn]=useState(true);
const[newsIn,setNewsIn]=useState("");
const[newsRes,setNewsRes]=useState(null);
const[showFlow,setShowFlow]=useState(false);
const prevPrices=useRef(prices);

useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t)},[]);

// 자동 시세 갱신 (5분마다)
const fetchPrices=useCallback(async()=>{
  try{
    // 여러 무료 API를 시도
    const results={};
    
    // 1. 유가 (WTI)
    try{
      const r=await fetch('https://api.exchangerate-api.com/v4/latest/USD');
      const d=await r.json();
      if(d.rates&&d.rates.KRW) results.usdkrw=Math.round(d.rates.KRW*100)/100;
    }catch(e){}

    // 2. 금/원유 - Yahoo Finance proxy
    try{
      const r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/GC=F?interval=1d&range=1d');
      const d=await r.json();
      if(d.chart?.result?.[0]?.meta?.regularMarketPrice) results.gold=Math.round(d.chart.result[0].meta.regularMarketPrice*100)/100;
    }catch(e){}

    try{
      const r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/CL=F?interval=1d&range=1d');
      const d=await r.json();
      if(d.chart?.result?.[0]?.meta?.regularMarketPrice) results.wti=Math.round(d.chart.result[0].meta.regularMarketPrice*100)/100;
    }catch(e){}

    try{
      const r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/NG=F?interval=1d&range=1d');
      const d=await r.json();
      if(d.chart?.result?.[0]?.meta?.regularMarketPrice) results.natgas=Math.round(d.chart.result[0].meta.regularMarketPrice*100)/100;
    }catch(e){}

    // 3. 코스피
    try{
      const r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/%5EKS11?interval=1d&range=1d');
      const d=await r.json();
      if(d.chart?.result?.[0]?.meta?.regularMarketPrice) results.kospi=Math.round(d.chart.result[0].meta.regularMarketPrice*100)/100;
    }catch(e){}

    try{
      const r=await fetch('https://query1.finance.yahoo.com/v8/finance/chart/%5EKQ11?interval=1d&range=1d');
      const d=await r.json();
      if(d.chart?.result?.[0]?.meta?.regularMarketPrice) results.kosdaq=Math.round(d.chart.result[0].meta.regularMarketPrice*100)/100;
    }catch(e){}

    if(Object.keys(results).length>0){
      setPrices(p=>{
        const newP={...p,...results};
        checkAlerts(newP,p);
        return newP;
      });
      setLastFetch(new Date());
    }
  }catch(e){console.log('Fetch error:',e)}
},[]);

useEffect(()=>{
  if(!autoOn)return;
  fetchPrices();
  const interval=setInterval(fetchPrices,5*60*1000); // 5분마다
  return()=>clearInterval(interval);
},[autoOn,fetchPrices]);

const checkAlerts=(np,op)=>{
  const na=[];
  if(np.wti>=100&&op.wti<100)na.push({time:new Date(),lv:"GREEN",msg:"🛢️ 유가 $100 돌파! 원유 ETF 절반 익절 권고"});
  if(np.wti>=130&&op.wti<130)na.push({time:new Date(),lv:"RED",msg:"🛢️ 유가 $130! 원유 ETF 추가 익절 → 금 전환"});
  if(np.wti<=60&&op.wti>60)na.push({time:new Date(),lv:"RED",msg:"⚠️ 유가 $60↓ 시나리오 붕괴! 에너지 매도"});
  if(np.gold>=3000&&op.gold<3000)na.push({time:new Date(),lv:"GREEN",msg:"🥇 금 $3,000 돌파! 일부 익절"});
  if(np.gold>=3500&&op.gold<3500)na.push({time:new Date(),lv:"GREEN",msg:"🥇 금 $3,500! 30% 익절 권고"});
  if(np.usdkrw>=1600&&op.usdkrw<1600)na.push({time:new Date(),lv:"GREEN",msg:"💵 환율 1,600 돌파!"});
  if(np.usdkrw>=1800&&op.usdkrw<1800)na.push({time:new Date(),lv:"RED",msg:"🚨 환율 1,800! 달러 절반 익절"});
  if(np.kospi<=5000&&op.kospi>5000)na.push({time:new Date(),lv:"GREEN",msg:"📉 코스피 5,000↓ 인버스 수익! 우량주 준비"});
  if(np.kospi<=4000&&op.kospi>4000)na.push({time:new Date(),lv:"RED",msg:"🚨 코스피 4,000! 인버스 익절 → 바닥 매수"});
  if(na.length)setAlerts(p=>[...na,...p].slice(0,50));
};

const handlePrice=(k,v)=>{
  const n=parseFloat(v)||0;
  const old={...prices};
  setPrices(p=>({...p,[k]:n}));
  checkAlerts({...prices,[k]:n},old);
};

const analyzeNews=()=>{
  if(!newsIn.trim())return;
  const lo=newsIn.toLowerCase();
  let lv="NEUTRAL",rec="",ic="⚪",kw="";
  for(const w of KW.red)if(lo.includes(w.toLowerCase())){lv="RED";kw=w;rec="⚠️ 시나리오 붕괴! 에너지·인버스 축소/매도. 금·달러 유지.";ic="🔴";break}
  if(lv==="NEUTRAL")for(const w of KW.yellow)if(lo.includes(w.toLowerCase())){lv="YELLOW";kw=w;rec="⚡ 주의. 에너지 50% 축소 대기. 추가 확인 필요.";ic="🟡";break}
  if(lv==="NEUTRAL")for(const w of KW.green)if(lo.includes(w.toLowerCase())){lv="GREEN";kw=w;rec="✅ 시나리오 강화! 포지션 유지/추가 매수 검토.";ic="🟢";break}
  if(lv==="NEUTRAL")rec="ℹ️ 직접 영향 판단 어려움. 포지션 유지.";
  setNewsRes({lv,rec,ic,text:newsIn,kw,time:new Date()});
  setAlerts(p=>[{time:new Date(),lv,msg:`${ic} [${kw||"분석"}] ${rec}`},...p].slice(0,50));
  setNewsIn("");
};

// 수익률 계산
const BASE={wti:67.02,gold:2650,usdkrw:1450,natgas:3.8,kospi:6244};
const rets=PORTFOLIO.map(item=>{
  let r=0;
  if(item.cat==="금")r=((prices.gold-BASE.gold)/BASE.gold)*100;
  else if(item.cat==="달러")r=((prices.usdkrw-BASE.usdkrw)/BASE.usdkrw)*100;
  else if(item.cat==="에너지"&&item.code==="261220")r=((prices.wti-BASE.wti)/BASE.wti)*100;
  else if(item.cat==="에너지"&&item.code==="396520")r=((prices.natgas-BASE.natgas)/BASE.natgas)*100;
  else if(item.cat==="인버스")r=((BASE.kospi-prices.kospi)/BASE.kospi)*100*(item.code==="252670"?2:1);
  else if(item.cat==="방산")r=prices.kospi<BASE.kospi?((BASE.kospi-prices.kospi)/BASE.kospi)*30:-((prices.kospi-BASE.kospi)/BASE.kospi)*20;
  return{r,cv:item.amt*(1+r/100)};
});

const totI=PORTFOLIO.reduce((s,p)=>s+p.amt,0);
const totC=rets.reduce((s,r)=>s+r.cv,0);
const totR=((totC-totI)/totI)*100;

const catT={};
PORTFOLIO.forEach((p,i)=>{
  if(!catT[p.cat])catT[p.cat]={inv:0,cur:0,c:p.c};
  catT[p.cat].inv+=p.amt;catT[p.cat].cur+=rets[i].cv;
});

const h=time.getHours(),d=time.getDay();
const mst=d===0||d===6?"⚫ 휴장":h>=9&&(h<15||(h===15&&time.getMinutes()<=30))?"🟢 장중":"🟠 장외";

const lvColor=lv=>lv==="RED"?"#ff4444":lv==="YELLOW"?"#FFD700":lv==="GREEN"?"#00ff88":"#666";

return React.createElement("div",null,
  // Auto-refresh bar
  React.createElement("div",{className:"refresh-bar"},
    React.createElement("div",null,
      autoOn?React.createElement("span",null,"🔄 자동 갱신 ",React.createElement("span",{className:"auto-badge"},"ON")," (5분 간격)"):"⏸️ 자동 갱신 OFF",
      lastFetch&&React.createElement("span",{style:{marginLeft:12}},"마지막: "+lastFetch.toLocaleTimeString("ko-KR"))
    ),
    React.createElement("div",{style:{display:"flex",gap:8,alignItems:"center"}},
      React.createElement("button",{onClick:fetchPrices,className:"btn-sm"},"🔄 지금 갱신"),
      React.createElement("button",{onClick:()=>setAutoOn(!autoOn),className:"btn-sm"},autoOn?"⏸️ 중지":"▶️ 시작")
    )
  ),

  // Header
  React.createElement("div",{className:"header"},
    React.createElement("div",null,
      React.createElement("div",{className:"title"},"⚔️ WARTIME PORTFOLIO"),
      React.createElement("div",{className:"subtitle"},"중동 3차대전 + 은행부실 | 24시간 자동 모니터링")
    ),
    React.createElement("div",null,
      React.createElement("div",{className:"clock"},time.toLocaleTimeString("ko-KR")),
      React.createElement("div",{className:"clock-sub"},time.toLocaleDateString("ko-KR",{year:"numeric",month:"long",day:"numeric",weekday:"short"})+" "+mst)
    )
  ),

  // P&L
  React.createElement("div",{className:"pnl",style:{background:totR>=0?"linear-gradient(90deg,rgba(0,255,136,.06),transparent)":"linear-gradient(90deg,rgba(255,68,68,.06),transparent)"}},
    React.createElement("div",null,React.createElement("span",{className:"pnl-label"},"투자금 "),React.createElement("span",{className:"pnl-val"},fmt(totI)+"원")),
    React.createElement("div",null,React.createElement("span",{className:"pnl-label"},"평가금 "),React.createElement("span",{className:"pnl-val",style:{color:totR>=0?"#00ff88":"#ff4444"}},fmt(Math.round(totC))+"원")),
    React.createElement("div",null,
      React.createElement("span",{className:"pnl-big",style:{color:totR>=0?"#00ff88":"#ff4444"}},(totR>=0?"+":"")+totR.toFixed(2)+"%"),
      React.createElement("span",{style:{color:totR>=0?"#00ff88":"#ff4444",fontSize:12,marginLeft:8}},"("+(totR>=0?"+":"")+fmt(Math.round(totC-totI))+"원)")
    )
  ),

  // 시세 요약 바
  React.createElement("div",{style:{padding:"8px 20px",display:"flex",gap:16,flexWrap:"wrap",borderBottom:"1px solid #ffffff08",fontSize:11}},
    [{k:"wti",l:"WTI",u:"$",b:67.02},{k:"gold",l:"금",u:"$",b:2650},{k:"usdkrw",l:"USD/KRW",u:"₩",b:1450},{k:"natgas",l:"가스",u:"$",b:3.8},{k:"kospi",l:"코스피",u:"",b:6244}].map(({k,l,u,b})=>{
      const chg=((prices[k]-b)/b)*100;
      return React.createElement("span",{key:k,style:{color:"#8892b0"}},
        l+" ",
        React.createElement("span",{style:{color:chg>=0?"#00ff88":"#ff4444",fontWeight:700}},
          u+prices[k].toLocaleString()+" "+(chg>=0?"▲":"▼")+Math.abs(chg).toFixed(1)+"%"
        )
      );
    })
  ),

  // Tabs
  React.createElement("div",{className:"tabs"},
    ["overview","prices","news","scenarios","timeline","alerts"].map((t,i)=>{
      const labels=["📊 현황","💹 시세","📰 뉴스","🎯 시나리오","📅 타임라인","🚨 알림("+alerts.length+")"];
      return React.createElement("button",{key:t,className:"tab"+(tab===t?" active":""),onClick:()=>setTab(t)},labels[i]);
    })
  ),

  // Content
  React.createElement("div",{className:"content"},

    // OVERVIEW
    tab==="overview"&&React.createElement("div",null,
      React.createElement("h3",{style:{color:"#00ff88",marginBottom:14,fontSize:14}},"📊 포트폴리오 현황"),
      React.createElement("div",{className:"grid grid-2",style:{marginBottom:18}},
        Object.entries(catT).map(([cat,d])=>{
          const r=((d.cur-d.inv)/d.inv)*100;
          return React.createElement("div",{key:cat,className:"card",style:{borderLeft:"4px solid "+d.c}},
            React.createElement("div",{style:{fontSize:10,color:"#8892b0"}},cat),
            React.createElement("div",{style:{fontSize:15,fontWeight:700,color:d.c}},fmt(d.inv)+"원"),
            React.createElement("div",{style:{fontSize:12,color:r>=0?"#00ff88":"#ff4444",marginTop:3}},
