<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📝 김엄마 시험결과 입력</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Dodum&family=Noto+Sans+KR:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f7f5ef;
  --paper: #ffffff;
  --ink: #1a1a2e;
  --ink-soft: #2d2d3d;
  --muted: #7d7d8e;
  --line: #e6e3d8;
  --line-soft: #f0ede3;
  --accent: #d4753a;
  --accent-dark: #b85f29;
  --accent-soft: #fef0e6;
  --success: #5a8a52;
  --success-bg: #eef6ec;
  --error: #c84f4f;
  --error-bg: #fceeec;
  --warn: #b8860b;
  --warn-bg: #fff4d6;
  --7f: #d4753a;
  --8f: #5e7eb6;
}
body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Noto Sans KR', sans-serif;
  min-height: 100vh;
  padding: 24px 16px;
  background-image:
    radial-gradient(circle at 20% 30%, rgba(212, 117, 58, 0.05), transparent 50%),
    radial-gradient(circle at 80% 70%, rgba(94, 126, 182, 0.05), transparent 50%);
}
.container {
  max-width: 1400px;
  margin: 0 auto;
  background: var(--paper);
  border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.06);
  overflow: hidden;
  border: 1px solid var(--line);
}

/* ===== 헤더: wordtest와 같은 톤 ===== */
header {
  padding: 32px 32px 24px;
  text-align: center;
  border-bottom: 1px solid var(--line);
  background: var(--paper);
}
header .brand {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-bottom: 6px;
}
header .brand-emoji { font-size: 1.5rem; }
header .brand-text {
  font-size: 1.7rem;
  font-weight: 800;
  color: var(--ink);
  letter-spacing: -0.5px;
}
header .brand-text .highlight {
  color: var(--accent);
}
header .subtitle {
  font-size: 0.75rem;
  font-weight: 500;
  color: var(--muted);
  letter-spacing: 4px;
  margin-bottom: 18px;
}
header .divider {
  width: 100%;
  height: 1px;
  background: var(--line);
  margin: 0 auto 16px;
  max-width: 600px;
}
header .page-title {
  font-size: 1.3rem;
  font-weight: 700;
  color: var(--ink);
  margin-bottom: 6px;
}
header .page-sub {
  font-size: 0.9rem;
  color: var(--muted);
}

/* ===== 툴바 ===== */
.toolbar {
  padding: 16px 32px;
  background: var(--line-soft);
  border-bottom: 1px solid var(--line);
  display: flex;
  align-items: center;
  gap: 14px;
  flex-wrap: wrap;
}
.toolbar label {
  font-size: 0.88rem;
  color: var(--ink-soft);
  font-weight: 500;
  margin-right: 2px;
}
.toolbar input[type="date"], .toolbar select {
  padding: 8px 12px;
  border: 1px solid var(--line);
  border-radius: 8px;
  font-family: inherit;
  font-size: 0.92rem;
  background: white;
  color: var(--ink);
}
.toolbar input[type="date"]:focus, .toolbar select:focus {
  outline: none;
  border-color: var(--accent);
}
.toolbar button {
  padding: 8px 18px;
  background: var(--ink);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 0.92rem;
  font-weight: 500;
  transition: background 0.2s;
}
.toolbar button:hover { background: var(--ink-soft); }
.toolbar .spacer { flex: 1; }

.stats {
  display: flex;
  gap: 8px;
  font-size: 0.85rem;
}
.stat-pill {
  padding: 5px 14px;
  border-radius: 100px;
  background: white;
  border: 1px solid var(--line);
  color: var(--muted);
  font-weight: 500;
}
.stat-pill b { color: var(--accent); font-weight: 700; margin: 0 2px; }
.stat-pill.done b { color: var(--success); }
.stat-pill.pending b { color: var(--error); }

/* ===== 콘텐츠 ===== */
.content {
  padding: 24px 32px;
}
.loading {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.loading .spinner {
  display: inline-block;
  width: 40px; height: 40px;
  border: 3px solid var(--line);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin-bottom: 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }

.empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--muted);
}
.empty .icon { font-size: 3rem; margin-bottom: 12px; }

/* ===== 테이블 ===== */
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 0.92rem;
}
thead th {
  background: var(--line-soft);
  padding: 12px 10px;
  text-align: left;
  font-weight: 600;
  color: var(--ink-soft);
  border-bottom: 2px solid var(--line);
  font-size: 0.82rem;
  position: sticky;
  top: 0;
  letter-spacing: 0.3px;
}
tbody td {
  padding: 12px 10px;
  border-bottom: 1px solid var(--line-soft);
  vertical-align: middle;
}
tbody tr:hover { background: #fffbf3; }

.idx { color: var(--muted); width: 36px; font-family: 'JetBrains Mono', monospace; }
.name { font-weight: 600; color: var(--ink); }
.seat { color: var(--muted); font-size: 0.85rem; margin-left: 4px; }
.timeslot {
  font-size: 0.82rem;
  color: var(--muted);
  padding: 3px 10px;
  background: var(--line-soft);
  border-radius: 100px;
  display: inline-block;
}
.book {
  font-size: 0.85rem;
  background: var(--accent-soft);
  color: var(--accent-dark);
  padding: 4px 10px;
  border-radius: 6px;
  display: inline-block;
  font-weight: 500;
}
.day {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  color: var(--accent);
  margin-left: 4px;
}
.total {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  text-align: center;
  width: 60px;
  color: var(--ink-soft);
}
.floor-7 { color: var(--7f); font-weight: 700; font-size: 0.88rem; }
.floor-8 { color: var(--8f); font-weight: 700; font-size: 0.88rem; }
.floor-unknown { color: var(--muted); font-weight: 500; font-size: 0.85rem; }

.wrong-input {
  width: 220px;
  padding: 8px 12px;
  border: 1px solid var(--line);
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 0.9rem;
  background: white;
  color: var(--ink);
  transition: border-color 0.15s, box-shadow 0.15s;
}
.wrong-input::placeholder { color: #bfbcb0; }
.wrong-input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(212, 117, 58, 0.12);
}

.score {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 700;
  text-align: center;
  width: 70px;
  font-size: 1rem;
}
.score.perfect { color: var(--success); }
.score.good { color: var(--accent); }
.score.fail { color: var(--error); }

.source-badge {
  font-size: 0.68rem;
  padding: 2px 7px;
  border-radius: 4px;
  margin-left: 6px;
  font-weight: 600;
}
.source-old { background: var(--accent-soft); color: var(--accent); }
.source-new { background: #e6f0ff; color: var(--8f); }
.source-both { background: var(--success-bg); color: var(--success); }

/* ===== 푸터 ===== */
.footer {
  padding: 20px 32px;
  background: var(--line-soft);
  border-top: 1px solid var(--line);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  flex-wrap: wrap;
}
.footer .hint {
  font-size: 0.85rem;
  color: var(--muted);
}
.btn-submit {
  padding: 12px 36px;
  background: var(--ink);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  font-size: 1rem;
  font-weight: 700;
  transition: background 0.2s, transform 0.1s;
  letter-spacing: 0.3px;
}
.btn-submit:hover {
  background: var(--ink-soft);
}
.btn-submit:active {
  transform: translateY(1px);
}
.btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }

/* ===== 토스트 ===== */
.toast {
  position: fixed;
  top: 24px;
  right: 24px;
  padding: 14px 24px;
  background: var(--ink);
  color: white;
  border-radius: 8px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  z-index: 1000;
  animation: slideIn 0.3s;
  font-weight: 500;
}
.toast.success { background: var(--success); }
.toast.error { background: var(--error); }
@keyframes slideIn {
  from { transform: translateX(100%); opacity: 0; }
  to { transform: translateX(0); opacity: 1; }
}

@media (max-width: 768px) {
  body { padding: 12px 8px; }
  .content { padding: 16px 12px; }
  .toolbar { padding: 12px; gap: 8px; }
  header { padding: 24px 16px 18px; }
  header .brand-text { font-size: 1.4rem; }
  header .page-title { font-size: 1.1rem; }
  .footer { padding: 16px; }
  .wrong-input { width: 140px; }
  table { font-size: 0.8rem; }
  thead th, tbody td { padding: 8px 4px; }
}
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="brand">
      <span class="brand-emoji">📝</span>
      <span class="brand-text">김엄마 <span class="highlight">시험결과</span></span>
    </div>
    <div class="subtitle">GRADE · BATCH INPUT</div>
    <div class="divider"></div>
    <div class="page-title">시험 결과 일괄 입력</div>
    <div class="page-sub">학생별 틀린 번호만 입력하세요. 빈 칸이면 만점 처리됩니다.</div>
  </header>

  <div class="toolbar">
    <label>날짜</label>
    <input type="date" id="filter-date">
    <label>층</label>
    <select id="filter-floor">
      <option value="">전체</option>
      <option value="7">7층</option>
      <option value="8">8층</option>
    </select>
    <button id="btn-reload">🔄 새로고침</button>
    <div class="spacer"></div>
    <div class="stats">
      <div class="stat-pill">총 <b id="stat-total">0</b>명</div>
      <div class="stat-pill done">입력 <b id="stat-done">0</b>명</div>
      <div class="stat-pill pending">미입력 <b id="stat-pending">0</b>명</div>
    </div>
  </div>

  <div class="content" id="content">
    <div class="loading">
      <div class="spinner"></div>
      <div>학생 명단을 불러오는 중...</div>
    </div>
  </div>

  <div class="footer">
    <div class="hint">💡 틀린 번호를 공백 또는 쉼표로 구분 (예: 3 7 12 또는 3,7,12) · 빈 칸 = 만점</div>
    <button class="btn-submit" id="btn-submit">💾 일괄 저장</button>
  </div>
</div>

<script>
// ============================================
// Apps Script Web App URL
// 김엄마관리형독서실_학생관리_API
// ============================================
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwhRjpr39UFtHAxThC93Qca-4VufMLm5TpadRS3Sz_Jue_MU0_la3xOujvqb7RnCzlR/exec';
// ============================================
// 상태
// ============================================
let _students = [];

// ============================================
// 유틸
// ============================================
function todayKR() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth() + 1).padStart(2, '0');
  const dd = String(d.getDate()).padStart(2, '0');
  return `${y}-${m}-${dd}`;
}

function parseWrongNumbers(s) {
  if (!s || !s.trim()) return [];
  return s.split(/[\s,]+/)
    .map(x => x.trim())
    .filter(x => x && /^\d+$/.test(x))
    .map(x => parseInt(x, 10));
}

function calcScore(total, wrongCount) {
  if (!total || total <= 0) return 100;
  const correct = Math.max(0, total - wrongCount);
  return Math.round((correct / total) * 1000) / 10;
}

function normalizeFloor(raw) {
  if (raw === null || raw === undefined) return '';
  const m = String(raw).match(/\d+/);
  return m ? m[0] : '';
}

function normalizeSeat(raw) {
  if (raw === null || raw === undefined) return '';
  const m = String(raw).match(/\d+/);
  return m ? m[0] : '';
}

async function postToScript(payload) {
  const response = await fetch(APPS_SCRIPT_URL, {
    method: 'POST',
    body: JSON.stringify(payload),
    headers: { 'Content-Type': 'text/plain;charset=utf-8' }
  });
  return await response.json();
}

async function getFromScript(params) {
  const url = new URL(APPS_SCRIPT_URL);
  Object.entries(params).forEach(([k, v]) => {
    if (v !== null && v !== undefined && v !== '') {
      url.searchParams.append(k, v);
    }
  });
  const response = await fetch(url.toString());
  return await response.json();
}

function showToast(msg, type = '') {
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

// ============================================
// 데이터 로드
// ============================================
async function loadStudents() {
  const date = document.getElementById('filter-date').value || todayKR();
  const content = document.getElementById('content');
  content.innerHTML = `<div class="loading"><div class="spinner"></div><div>학생 명단 불러오는 중...</div></div>`;
  
  try {
    const result = await getFromScript({
      action: 'gr_getTodayExamStudents',
      date: date
    });
    
    if (result && result.status === 'success') {
      _students = result.students || [];
      _students.forEach(s => {
        s.floor = normalizeFloor(s.floor);
        s.seat = normalizeSeat(s.seat);
      });
      renderStudents();
      updateStats();
    } else {
      content.innerHTML = `<div class="empty"><div class="icon">⚠️</div><div>${(result && result.message) || '데이터를 불러올 수 없습니다'}</div></div>`;
    }
  } catch (e) {
    content.innerHTML = `<div class="empty"><div class="icon">❌</div><div>오류 발생: ${e.message}</div></div>`;
  }
}

// ============================================
// 학생 목록 렌더링
// ============================================
function renderStudents() {
  const content = document.getElementById('content');
  const floor = document.getElementById('filter-floor').value;
  
  let students = _students;
  if (floor) {
    students = students.filter(s => String(s.floor) === floor);
  }
  
  if (students.length === 0) {
    content.innerHTML = `<div class="empty"><div class="icon">📭</div><div>해당 조건의 학생이 없습니다.</div></div>`;
    return;
  }
  
  let html = `
    <table>
      <thead>
        <tr>
          <th>#</th>
          <th>학생</th>
          <th>층/자리</th>
          <th>시간</th>
          <th>단어장 / DAY</th>
          <th>총문제</th>
          <th>틀린 번호 입력</th>
          <th>점수</th>
        </tr>
      </thead>
      <tbody>
  `;
  
  students.forEach((s, i) => {
    const sourceBadge = s.source === 'both'
      ? '<span class="source-badge source-both">확인</span>'
      : (s.source === 'old' ? '<span class="source-badge source-old">구</span>' : '<span class="source-badge source-new">신</span>');
    
    let floorDisplay, floorClass;
    if (s.floor === '7') {
      floorDisplay = '7층';
      floorClass = 'floor-7';
    } else if (s.floor === '8') {
      floorDisplay = '8층';
      floorClass = 'floor-8';
    } else {
      floorDisplay = '?층';
      floorClass = 'floor-unknown';
    }
    
    const seatDisplay = s.seat ? `${s.seat}번` : '';
    
    html += `
      <tr data-idx="${i}">
        <td class="idx">${i + 1}</td>
        <td>
          <div class="name">${s.name}${sourceBadge}</div>
        </td>
        <td>
          <span class="${floorClass}">${floorDisplay}</span>
          <span class="seat">${seatDisplay}</span>
        </td>
        <td><span class="timeslot">${s.timeSlot || '-'}</span></td>
        <td>
          <span class="book">${s.book || '?'}</span>
          <span class="day">DAY ${s.dayRange || '?'}</span>
        </td>
        <td class="total">${s.totalQuestions || 0}</td>
        <td>
          <input type="text" class="wrong-input" data-idx="${i}"
            placeholder="예: 3 7 12 25 (빈칸=만점)"
            inputmode="numeric">
        </td>
        <td class="score" data-score-idx="${i}">100</td>
      </tr>
    `;
  });
  
  html += `</tbody></table>`;
  content.innerHTML = html;
  
  document.querySelectorAll('.wrong-input').forEach(input => {
    input.addEventListener('input', e => {
      const idx = parseInt(e.target.dataset.idx);
      const student = _students[idx];
      const wrong = parseWrongNumbers(e.target.value);
      const score = calcScore(student.totalQuestions, wrong.length);
      const scoreEl = document.querySelector(`[data-score-idx="${idx}"]`);
      if (scoreEl) {
        scoreEl.textContent = score;
        scoreEl.className = `score ${score === 100 ? 'perfect' : (score >= 80 ? 'good' : 'fail')}`;
      }
      student._wrongInput = e.target.value;
      updateStats();
    });
    
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const all = Array.from(document.querySelectorAll('.wrong-input'));
        const i = all.indexOf(e.target);
        if (i < all.length - 1) all[i + 1].focus();
      }
    });
  });
}

function updateStats() {
  const total = _students.length;
  const done = _students.filter(s => s._wrongInput !== undefined && s._wrongInput.trim() !== '').length;
  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-done').textContent = done;
  document.getElementById('stat-pending').textContent = total - done;
}

// ============================================
// 저장
// ============================================
async function submitAll() {
  const btn = document.getElementById('btn-submit');
  btn.disabled = true;
  btn.textContent = '저장 중...';
  
  const date = document.getElementById('filter-date').value || todayKR();
  const results = _students.map(s => ({
    name: s.name,
    floor: s.floor,
    seat: s.seat,
    book: s.book,
    bookCode: s.bookCode,
    dayRange: s.dayRange,
    totalQuestions: s.totalQuestions,
    wrongInput: s._wrongInput || ''
  }));
  
  try {
    const result = await postToScript({
      action: 'gr_submitGradeResults',
      date: date,
      results: results
    });
    
    if (result && result.status === 'success') {
      showToast(`✅ ${result.savedCount}건 저장 완료!`, 'success');
      setTimeout(() => loadStudents(), 1500);
    } else {
      showToast(`❌ ${(result && result.message) || '저장 실패'}`, 'error');
    }
  } catch (e) {
    showToast(`❌ 오류: ${e.message}`, 'error');
  }
  
  btn.disabled = false;
  btn.textContent = '💾 일괄 저장';
}

// ============================================
// 초기화
// ============================================
window.addEventListener('DOMContentLoaded', () => {
  document.getElementById('filter-date').value = todayKR();
  document.getElementById('btn-reload').addEventListener('click', loadStudents);
  document.getElementById('filter-floor').addEventListener('change', renderStudents);
  document.getElementById('btn-submit').addEventListener('click', submitAll);
  loadStudents();
});
</script>
</body>
</html>
