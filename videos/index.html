<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>김엄마 관리형 독서실 - 합격후기 영상</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700;800;900&family=Black+Han+Sans&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a3a5c;
            --primary-light: #2a5a8c;
            --bg-warm: #faf8f5;
            --bg-card: #ffffff;
            --text-dark: #1e293b;
            --text-mid: #475569;
            --text-light: #94a3b8;
            --border: #e2e8f0;
            --shadow: 0 4px 20px rgba(0,0,0,0.10);
            --radius: 16px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: var(--bg-warm);
            color: var(--text-dark);
            line-height: 1.7;
            overflow-x: hidden;
        }
        .hero {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 50%, #3b82f6 100%);
            padding: 48px 24px 56px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .hero::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.06) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(245,158,11,0.08) 0%, transparent 40%);
            animation: heroFloat 20s ease-in-out infinite;
        }
        @keyframes heroFloat {
            0%, 100% { transform: translate(0,0) rotate(0deg); }
            50% { transform: translate(-2%, 1%) rotate(1deg); }
        }
        .hero h1 {
            font-family: 'Black Han Sans', sans-serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            color: #fff;
            position: relative;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
        }
        .hero p {
            color: rgba(255,255,255,0.8);
            font-size: 1.05rem;
            font-weight: 300;
            position: relative;
        }
        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            margin-top: 20px;
            padding: 10px 24px;
            background: rgba(255,255,255,0.15);
            border: 1.5px solid rgba(255,255,255,0.5);
            border-radius: 100px;
            color: #fff;
            font-family: 'Noto Sans KR', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            text-decoration: none;
            position: relative;
            transition: background 0.25s, transform 0.2s;
        }
        .home-btn:hover { background: rgba(255,255,255,0.28); transform: translateY(-2px); }

        .content {
            max-width: 1100px;
            margin: 0 auto 48px;
            padding: 0 20px;
        }

        /* 학생 섹션 구분 */
        .student-section {
            margin-top: 40px;
        }
        .student-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 20px 24px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }
        .student-header.jeon {
            background: linear-gradient(135deg, #1a3a5c 0%, #2a5a8c 100%);
        }
        .student-header.baek {
            background: linear-gradient(135deg, #7c3aed 0%, #4f46e5 100%);
        }
        .student-avatar {
            width: 56px; height: 56px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.6rem;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.4);
        }
        .student-info { flex: 1; }
        .student-name {
            font-family: 'Black Han Sans', sans-serif;
            font-size: 1.3rem;
            color: #fff;
            letter-spacing: 0.5px;
        }
        .student-detail {
            font-size: 0.85rem;
            color: rgba(255,255,255,0.75);
            font-weight: 400;
            margin-top: 2px;
        }
        .student-badge {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: #fff;
            font-size: 0.8rem;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 100px;
            white-space: nowrap;
        }
        .section-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }
        .count-label {
            font-size: 0.9rem;
            color: var(--text-mid);
            font-weight: 500;
        }
        .yt-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 18px;
            background: #ff0000;
            color: #fff;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.2s;
        }
        .yt-btn:hover { opacity: 0.85; transform: translateY(-2px); }

        /* 구분선 */
        .divider {
            border: none;
            border-top: 2px dashed var(--border);
            margin: 48px 0 0;
        }

        /* 로딩 */
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-mid);
            font-size: 1rem;
        }
        .spinner {
            width: 36px; height: 36px;
            border: 3px solid var(--border);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 그리드 */
        .shorts-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
        }
        @media (min-width: 600px)  { .shorts-grid { grid-template-columns: repeat(3, 1fr); } }
        @media (min-width: 900px)  { .shorts-grid { grid-template-columns: repeat(4, 1fr); } }

        .short-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: var(--shadow);
            cursor: pointer;
            transition: transform 0.25s, box-shadow 0.25s;
        }
        .short-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 14px 40px rgba(0,0,0,0.16);
        }
        .thumb-wrap {
            position: relative;
            width: 100%;
            padding-bottom: 177.78%;
            background: #111;
            overflow: hidden;
        }
        .thumb-wrap img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.4s;
        }
        .thumb-wrap img.no-thumb {
            display: none;
        }
        .thumb-placeholder {
            position: absolute;
            inset: 0;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #1e1b4b 0%, #3730a3 50%, #4f46e5 100%);
            color: rgba(255,255,255,0.9);
            text-align: center;
            padding: 16px;
            gap: 8px;
        }
        .thumb-placeholder.show { display: flex; }
        .thumb-placeholder .ph-icon { font-size: 2rem; }
        .thumb-placeholder .ph-label {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 1px;
            color: rgba(255,255,255,0.6);
            text-transform: uppercase;
        }
        .thumb-placeholder .ph-soon {
            font-size: 0.8rem;
            font-weight: 600;
            color: #a5b4fc;
            background: rgba(255,255,255,0.12);
            padding: 3px 10px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.2);
        }
        .short-card:hover .thumb-wrap img { transform: scale(1.05); }
        .play-overlay {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.22);
            transition: background 0.2s;
        }
        .short-card:hover .play-overlay { background: rgba(0,0,0,0.08); }
        .play-icon {
            width: 52px; height: 52px;
            background: rgba(255,255,255,0.92);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            padding-left: 4px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.3);
        }
        .shorts-badge {
            position: absolute;
            bottom: 10px; left: 10px;
            background: #ff0000;
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 4px;
        }
        .card-num {
            position: absolute;
            top: 10px; right: 10px;
            background: rgba(0,0,0,0.55);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 6px;
        }
        .card-title {
            padding: 12px 14px 14px;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--text-dark);
            line-height: 1.5;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 업로드 예정 안내 */
        .coming-soon {
            grid-column: 1 / -1;
            text-align: center;
            padding: 32px 20px;
            background: linear-gradient(135deg, #f8f4ff, #ede9fe);
            border-radius: var(--radius);
            border: 2px dashed #c4b5fd;
            color: #7c3aed;
        }
        .coming-soon .cs-icon { font-size: 2rem; margin-bottom: 8px; }
        .coming-soon p { font-size: 0.9rem; font-weight: 600; }
        .coming-soon small { font-size: 0.8rem; color: #a78bfa; font-weight: 400; }

        /* 모달 */
        .modal-bg {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.88);
            z-index: 9999;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-bg.open { display: flex; }
        .modal-box { position: relative; width: 100%; max-width: 380px; }
        .modal-close {
            position: absolute;
            top: -48px; right: 0;
            background: none; border: none;
            color: #fff; font-size: 40px;
            cursor: pointer; line-height: 1;
            transition: transform 0.2s;
        }
        .modal-close:hover { transform: scale(1.2); }
        .modal-video {
            position: relative;
            width: 100%;
            padding-bottom: 177.78%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        .modal-video iframe {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            border: none;
        }
        .footer-note {
            text-align: center;
            padding: 0 16px 40px;
            color: var(--text-light);
            font-size: 0.82rem;
        }
    </style>
</head>
<body>

<header class="hero">
    <h1>김엄마 관리형 독서실</h1>
    <p>합격후기 영상 🎬</p>
    <a href="https://www.kmsongdo.store/" class="home-btn">← 홈으로 돌아가기</a>
</header>

<div class="content">

    <!-- ===== 전지영 섹션 ===== -->
    <div class="student-section">
        <div class="student-header jeon">
            <div class="student-avatar">🎓</div>
            <div class="student-info">
                <div class="student-name">전지영</div>
                <div class="student-detail">인천포스코고 졸업 · 고려대학교 바이오의공학과 합격</div>
            </div>
            <div class="student-badge">고3 합격생</div>
        </div>
        <div class="section-meta">
            <span class="count-label" id="jeonCount"></span>
            <a href="https://www.youtube.com/@kimmom_songdo/shorts" target="_blank" class="yt-btn">▶ 채널 전체보기</a>
        </div>
        <div id="jeonLoading" class="loading">
            <div class="spinner"></div>
            영상 정보를 불러오는 중...
        </div>
        <div class="shorts-grid" id="jeonGrid" style="display:none;"></div>
    </div>

    <hr class="divider">

    <!-- ===== 백효찬 섹션 ===== -->
    <div class="student-section">
        <div class="student-header baek">
            <div class="student-avatar">🏆</div>
            <div class="student-info">
                <div class="student-name">백효찬</div>
                <div class="student-detail">고려대학교 합격</div>
            </div>
            <div class="student-badge">고3 합격생</div>
        </div>
        <div class="section-meta">
            <span class="count-label" id="baekCount"></span>
            <a href="https://www.youtube.com/@kimmom_songdo/shorts" target="_blank" class="yt-btn">▶ 채널 전체보기</a>
        </div>
        <div id="baekLoading" class="loading" style="display:none;"></div>
        <div class="shorts-grid" id="baekGrid"></div>
    </div>

</div>

<div class="footer-note">© 김엄마 관리형 독서실 · 영상은 YouTube에서 제공됩니다</div>

<div class="modal-bg" id="modalBg">
    <div class="modal-box">
        <button class="modal-close" onclick="closeModal()">×</button>
        <div class="modal-video">
            <iframe id="modalIframe" src="" allow="autoplay; encrypted-media" allowfullscreen></iframe>
        </div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyDUBvXLy9V4XL3A5QUWCze9I0c4jxXLR1U';

    // 전지영 영상 ID 목록
    const jeonVideoIds = [
        "kqzuGt6LABA","u8v2UMCzIjM","J125Jtr4PB0","Jpwaa6-YlrA",
        "2m9zZiK2TX8","mKfFxb8aGkE","7yRFUM93O9A","ytcKvayo90s",
        "QBQ6g4ujXtI","7ud_xGUm6IQ","SQ6GU83wILA","LBAUObTnF0Q",
        "kHEIzuyt2uo","Z5zX9CfeFRM","fhp-0v8c2-o","P0yAMFkqpqo",
        "P6qC4nvmBws","2VMNZcevpLQ"
    ];

    // 백효찬 영상 ID 목록 — 업로드되는대로 여기에 추가!
    const baekVideoIds = [
        "Q7u0BiYGF20",
        "V3wFzy4-VD4",
        "ErqMWhDxKco",
        "Cpzp_Q6TTYo",
        "23Ks71lkEzU",
        "iEvSbW1vb44",
        "dGM62PDssKc",
        "gtA7zmKIgM0"
        // 새 영상 업로드 후 여기에 ID 추가:
        // "영상ID",
    ];

    async function fetchTitles(ids) {
        try {
            const url = `https://www.googleapis.com/youtube/v3/videos?id=${ids.join(',')}&part=snippet&key=${API_KEY}`;
            const res = await fetch(url);
            const data = await res.json();
            const map = {};
            (data.items || []).forEach(item => { map[item.id] = item.snippet.title; });
            return map;
        } catch(e) {
            return {};
        }
    }

    function buildCard(id, index, titleMap) {
        const raw = titleMap[id] || '';
        const cleanTitle = raw.replace(/#Shorts?/gi, '').replace(/\| 김엄마.*$/i, '').trim() || '합격후기 영상';
        const card = document.createElement('div');
        card.className = 'short-card';
        card.onclick = () => openModal(id);
        card.innerHTML = `
            <div class="thumb-wrap">
                <img src="https://i.ytimg.com/vi/${id}/maxresdefault.jpg" alt="${cleanTitle}" loading="lazy">
                <div class="thumb-placeholder">
                    <div class="ph-icon">🎬</div>
                    <div class="ph-label">합격후기 영상</div>
                    <div class="ph-soon">공개 예정</div>
                </div>
                <div class="play-overlay"><div class="play-icon">▶</div></div>
                <span class="shorts-badge">Shorts</span>
                <span class="card-num">${index + 1}</span>
            </div>
            <div class="card-title">${cleanTitle}</div>
        `;
        // 썸네일 순차 시도: hqdefault → mqdefault → 플레이스홀더
        const img = card.querySelector('img');
        const ph = card.querySelector('.thumb-placeholder');
        // 쇼츠는 세로 영상 → maxresdefault → hqdefault → oq1080p → 플레이스홀더 순서로 시도
        const thumbUrls = [
            `https://i.ytimg.com/vi/${id}/maxresdefault.jpg`,
            `https://i.ytimg.com/vi/${id}/hqdefault.jpg`,
            `https://i.ytimg.com/vi/${id}/oq1080p.jpg`,
        ];
        let thumbIdx = 0;
        img.src = thumbUrls[0];
        img.onload = () => { img.style.display = 'block'; ph.classList.remove('show'); };
        img.onerror = () => {
            thumbIdx++;
            if (thumbIdx < thumbUrls.length) {
                img.src = thumbUrls[thumbIdx];
            } else {
                // 모두 실패 → 플레이스홀더 표시
                img.style.display = 'none';
                ph.classList.add('show');
            }
        };
        return card;
    }

    async function loadSection(videoIds, gridId, loadingId, countId) {
        const titleMap = await fetchTitles(videoIds);
        document.getElementById(loadingId).style.display = 'none';
        const grid = document.getElementById(gridId);
        grid.style.display = 'grid';
        document.getElementById(countId).textContent = `영상 ${videoIds.length}개`;
        videoIds.forEach((id, i) => {
            grid.appendChild(buildCard(id, i, titleMap));
        });
    }

    async function loadBaekSection() {
        const grid = document.getElementById('baekGrid');
        const titleMap = await fetchTitles(baekVideoIds);
        document.getElementById('baekCount').textContent = `영상 ${baekVideoIds.length}개 · 계속 업로드 중 🔄`;
        baekVideoIds.forEach((id, i) => {
            grid.appendChild(buildCard(id, i, titleMap));
        });
        // 업로드 예정 안내 카드
        const more = document.createElement('div');
        more.className = 'coming-soon';
        more.innerHTML = `
            <div class="cs-icon">🎬</div>
            <p>더 많은 영상이 업로드되고 있어요!</p>
            <small>백효찬 합격 인터뷰 영상이 순차적으로 추가됩니다</small>
        `;
        grid.appendChild(more);
    }

    // 두 섹션 동시 로드
    loadSection(jeonVideoIds, 'jeonGrid', 'jeonLoading', 'jeonCount');
    loadBaekSection();

    function openModal(id) {
        document.getElementById('modalIframe').src =
            `https://www.youtube.com/embed/${id}?autoplay=1&loop=1&playlist=${id}`;
        document.getElementById('modalBg').classList.add('open');
        document.body.style.overflow = 'hidden';
    }
    function closeModal() {
        document.getElementById('modalIframe').src = '';
        document.getElementById('modalBg').classList.remove('open');
        document.body.style.overflow = '';
    }
    document.getElementById('modalBg').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>
</body>
</html>
