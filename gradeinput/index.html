<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=https://script.google.com/macros/s/AKfycbxJ5MuBqPTiQU0kt9ElZuJLJ0ip6DZrAg3M7a39793GcsiMskRYRKuE-ebdHws7G8FG/exec?action=gradeInput">
  <title>시험 결과 입력</title>
  <style>
    body {
      font-family: 'Apple SD Gothic Neo', -apple-system, sans-serif;
      display: flex; align-items: center; justify-content: center;
      height: 100vh; margin: 0; background: #f5f7fa; color: #374151;
    }
    .box { text-align: center; }
    .spinner {
      width: 36px; height: 36px;
      border: 3px solid #e5e7eb; border-top-color: #1a73e8;
      border-radius: 50%; animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    p { font-size: 15px; color: #6b7280; margin-bottom: 12px; }
    a { color: #1a73e8; font-size: 13px; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>시험 결과 입력 화면으로 이동 중...</p>
    <a href="https://script.google.com/macros/s/AKfycbxJ5MuBqPTiQU0kt9ElZuJLJ0ip6DZrAg3M7a39793GcsiMskRYRKuE-ebdHws7G8FG/exec?action=gradeInput">자동으로 이동하지 않으면 여기를 클릭하세요</a>
  </div>
  <script>
    window.location.replace('https://script.google.com/macros/s/AKfycbxJ5MuBqPTiQU0kt9ElZuJLJ0ip6DZrAg3M7a39793GcsiMskRYRKuE-ebdHws7G8FG/exec?action=gradeInput');
  </script>
</body>
</html>
