  <title>오답노트 - 이동 중...</title>

    body { font-family:'Apple SD Gothic Neo',sans-serif; display:flex; align-items:center;
           justify-content:center; height:100vh; margin:0; background:#f7f5ef; }
    .box { text-align:center; }
    .spinner { width:32px; height:32px; border:3px solid #e6e3d8; border-top-color:#d4753a;
               border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 16px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { font-size:15px; color:#7d7d8e; margin-bottom:12px; }
    a { color:#d4753a; font-size:13px; }
  </style>
</head>
<body>

    <div class="spinner"></div>

  </div>
